---
version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    commit-message:
      prefix: "build(github-actions)"

  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "daily"
    versioning-strategy: increase
    commit-message:
      prefix: "feat(metadata)"
    allow:
      - dependency-name: "@salesforce/source-deploy-retrieve"

  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    versioning-strategy: increase
    commit-message:
      prefix: "chore(deps)"
    labels:
      - "manual-review-only"
    allow:
      - dependency-name: "@nodable/*"
