---
name: Performance Benchmarks
on:
  workflow_call:
    inputs:
      auto-push:
        description: Push benchmark data to gh-pages
        type: boolean
        default: false

jobs:
  perf:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    env:
      # Disable husky hooks (notably post-checkout, which runs
      # `npm run dependencies:reinstall`). Without this, every baseline
      # `git checkout` inside this job re-dirties package-lock.json,
      # breaking the benchmark-action step's internal `git switch gh-pages`.
      HUSKY: '0'
    steps:
      - name: Checkout sources
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup node
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - uses: google/wireit@setup-github-actions-caching/v2

      - name: Setup dependencies, cache and install
        uses: ./.github/actions/install

      - name: Checkout gh-pages baseline data
        uses: actions/checkout@v6
        with:
          ref: gh-pages
          path: gh-pages-data

      - name: Run baseline benchmarks (base branch)
        if: ${{ !inputs.auto-push }}
        env:
          BASE_REF: ${{ github.event.pull_request.base.sha || github.event.before || 'HEAD~1' }}
        run: |
          CURRENT_REF=$(git rev-parse HEAD)
          git checkout --detach --force "$BASE_REF"
          npm ci --no-fund --prefer-offline
          npm run test:perf
          cp perf-runtime.json perf-runtime-base.json
          cp perf-memory.json perf-memory-base.json
          git checkout --force "$CURRENT_REF"
          npm ci --no-fund --prefer-offline
          # npm ci can touch tracked files (e.g. metadata-only writes to
          # package-lock.json on some npm versions) leaving the WC dirty.
          # Reset every tracked file so the subsequent benchmark-action
          # step's internal `git switch gh-pages` isn't blocked by a
          # "Your local changes would be overwritten" error.
          git checkout -- .

      - name: Run benchmarks
        run: npm run test:perf

      - name: Compare against baseline (same runner)
        if: ${{ !inputs.auto-push }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: node __tests__/perf/compareBaseline.mjs

      - name: Generate preview with trends
        run: node __tests__/perf/preview.mjs gh-pages-data

      - name: Reset WC before gh-pages switch
        if: ${{ !inputs.auto-push }}
        run: |
          # benchmark-action's internal `git switch gh-pages` fails with
          # "Your local changes would be overwritten" if any tracked file
          # is dirty. Clean the WC now so the switch succeeds; perf
          # artifacts (perf-runtime.json, perf-memory.json) are gitignored
          # and survive `git clean -fd` via the whitelist below.
          git status --short
          git checkout -- .
          git clean -fd -e perf-runtime.json -e perf-memory.json -e perf-runtime-base.json -e perf-memory-base.json -e perf-comparison.md -e perf-preview.html -e perf-raw.json -e gh-pages-data

      - name: Runtime benchmark
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: Runtime Benchmark
          tool: customBiggerIsBetter
          output-file-path: ./perf-runtime.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: ${{ inputs.auto-push }}
          save-data-file: ${{ inputs.auto-push }}
          alert-threshold: '130%'
          comment-on-alert: false
          fail-on-alert: true
          summary-always: ${{ inputs.auto-push }}
          alert-comment-cc-users: '@scolladon'
          benchmark-data-dir-path: dev/bench/runtime

      - name: Latency benchmark
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: Latency Benchmark
          tool: customSmallerIsBetter
          output-file-path: ./perf-memory.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: ${{ inputs.auto-push }}
          save-data-file: ${{ inputs.auto-push }}
          skip-fetch-gh-pages: true
          alert-threshold: '150%'
          comment-on-alert: false
          fail-on-alert: true
          summary-always: ${{ inputs.auto-push }}
          alert-comment-cc-users: '@scolladon'
          benchmark-data-dir-path: dev/bench/memory

      - name: Upload benchmark report
        uses: actions/upload-artifact@v6
        with:
          name: perf-report
          path: |
            perf-preview.html
            perf-runtime.json
            perf-memory.json
            perf-comparison.md
