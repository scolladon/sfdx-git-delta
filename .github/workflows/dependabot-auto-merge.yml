---
name: Dependabot Auto-Merge

on: pull_request

permissions:
  contents: write
  pull-requests: write

jobs:
  dependabot:
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'
    steps:
      - name: Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: "${{ secrets.GITHUB_TOKEN }}"

      - name: Checkout PR branch
        if: steps.metadata.outputs.package-ecosystem == 'npm_and_yarn' && contains(steps.metadata.outputs.dependency-names, '@salesforce/source-deploy-retrieve')
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          token: ${{ secrets.RELEASE_PAT }}

      - name: Setup Node
        if: steps.metadata.outputs.package-ecosystem == 'npm_and_yarn' && contains(steps.metadata.outputs.dependency-names, '@salesforce/source-deploy-retrieve')
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install dependencies
        if: steps.metadata.outputs.package-ecosystem == 'npm_and_yarn' && contains(steps.metadata.outputs.dependency-names, '@salesforce/source-deploy-retrieve')
        run: HUSKY=0 npm ci

      - name: Build
        if: steps.metadata.outputs.package-ecosystem == 'npm_and_yarn' && contains(steps.metadata.outputs.dependency-names, '@salesforce/source-deploy-retrieve')
        run: npm run build

      - name: Check if SDR metadata registry changed
        id: registry-check
        if: steps.metadata.outputs.package-ecosystem == 'npm_and_yarn' && contains(steps.metadata.outputs.dependency-names, '@salesforce/source-deploy-retrieve')
        env:
          OLD_VERSION: ${{ steps.metadata.outputs.previous-version }}
        run: |
          REGISTRY_PATH="lib/src/registry/metadataRegistry.json"

          # Download old version tarball to extract its registry
          TARBALL=$(npm pack "@salesforce/source-deploy-retrieve@${OLD_VERSION}" --pack-destination /tmp 2>/dev/null)
          mkdir -p /tmp/sdr-old
          tar -xzf "/tmp/${TARBALL}" -C /tmp/sdr-old

          # Compare metadata registries
          OLD_FILE="/tmp/sdr-old/package/${REGISTRY_PATH}"
          NEW_FILE="node_modules/@salesforce/source-deploy-retrieve/${REGISTRY_PATH}"

          if diff -q "$OLD_FILE" "$NEW_FILE" > /dev/null 2>&1; then
            echo "registry_changed=false" >> "$GITHUB_OUTPUT"
            echo "No metadata registry changes detected between SDR versions"
          else
            echo "registry_changed=true" >> "$GITHUB_OUTPUT"
            echo "Metadata registry changes detected between SDR versions"
          fi

          # Cleanup
          rm -rf /tmp/sdr-old "/tmp/${TARBALL}"

      - name: Close PR if not a registry change
        if: steps.registry-check.outputs.registry_changed == 'false'
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          OLD_VERSION: ${{ steps.metadata.outputs.previous-version }}
          NEW_VERSION: ${{ steps.metadata.outputs.new-version }}
          GITHUB_TOKEN: ${{ secrets.RELEASE_PAT }}
        run: |
          gh pr close "$PR_URL" --comment "Closing: @salesforce/source-deploy-retrieve update from ${OLD_VERSION} to ${NEW_VERSION} does not include metadata registry changes."

      - name: Sync internal registry with SDR
        if: steps.registry-check.outputs.registry_changed == 'true'
        run: |
          npm run sync:registry
          npm run build
          npm run lint:fix

      - name: Update e2e expected files API version
        if: steps.registry-check.outputs.registry_changed == 'true'
        run: |
          # Extract new API version from the updated SDR
          NEW_VERSION=$(node -e "import('@salesforce/source-deploy-retrieve').then(m => m.getCurrentApiVersion()).then(v => process.stdout.write(v + '.0'))")

          # Fetch and checkout e2e/head in a worktree
          git fetch origin e2e/head
          git worktree add /tmp/e2e-head origin/e2e/head

          # Update <version> tags in expected XML package manifests
          cd /tmp/e2e-head
          find expected/package expected/destructiveChanges -name "*.xml" -exec sed -i "s|<version>[0-9.]*</version>|<version>${NEW_VERSION}</version>|g" {} +

          # Amend the last commit if version changed
          if ! git diff --quiet; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add expected/package expected/destructiveChanges
            git commit --amend --no-edit
            git push --force-with-lease origin HEAD:e2e/head
          fi

          # Clean up worktree
          cd -
          git worktree remove /tmp/e2e-head

      - name: Commit and push if changed
        if: steps.registry-check.outputs.registry_changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/metadata/internalRegistry.ts
          git diff --staged --quiet || git commit -m "feat(metadata): sync internal registry with SDR update"
          git push

      - name: Enable auto-merge for Dependabot PRs
        if: steps.registry-check.outputs.registry_changed == 'true'
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GITHUB_TOKEN: ${{ secrets.RELEASE_PAT }}
        run: |
          gh pr review --approve "$PR_URL"
          gh pr merge --auto --squash "$PR_URL"
